spring.application.name=Smart Tourist Safety Monitoring System
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourist_safety_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-to-a-long-random-value}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.google-maps.api-key=${GOOGLE_MAPS_API_KEY:}
app.open-weather.api-key=${OPENWEATHER_API_KEY:}
app.upload-dir=${UPLOAD_DIR:uploads}
